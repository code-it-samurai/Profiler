version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Pull model on first run
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull qwen3.5:9b &&
             wait"

  profiler:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ./profiler.db:/app/profiler.db

volumes:
  ollama_data:
